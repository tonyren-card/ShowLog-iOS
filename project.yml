name: ShowLog
options:
  bundleIdPrefix: com.tonyren
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""

targets:
  ShowLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShowLog/Sources
    resources:
      - path: ShowLog/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonyren.showlog
        INFOPLIST_FILE: ShowLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
